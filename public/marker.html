<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hologram Marker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Syne:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="marker-page">
    <header id="appNav" class="app-nav"></header>
    <main class="marker-shell">
      <h1>Marker: HOLO_MARKER_V1</h1>
      <p>Keep this marker visible to the camera in viewer mode.</p>
      <canvas id="markerCanvas" width="340" height="340"></canvas>
      <p class="hint">Print or show this page on another phone/laptop screen.</p>
    </main>
    <script src="./account-nav.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
    <script>
      const markerCanvas = document.getElementById("markerCanvas");
      QRCode.toCanvas(markerCanvas, "HOLO_MARKER_V1", {
        width: 320,
        margin: 1,
        color: {
          dark: "#221D23",
          light: "#D0E37F"
        }
      });
    </script>
  </body>
</html>
